repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: python -m ruff check --fix
        language: system
        pass_filenames: false
      - id: ruff-format
        name: ruff format
        entry: python -m ruff format
        language: system
        pass_filenames: false
      - id: mypy
        name: mypy
        entry: python -m mypy
        language: system
        pass_filenames: false
